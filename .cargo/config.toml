[build]
# 使用原生CPU优化（提升10-20%性能）
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-gnu]
# 使用lld链接器（更快）
linker    = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

