# ───────────────────────────────────────────────────────────────────────────── #
# Makefile.toml
# ucs-fe — cargo-make task file
# https://github.com/sagiegurari/cargo-make
#
# Usage:
# ── DEFAULT ──────────────────────────────────────────────────────────────
# cargo make                  # fmt-check → debug build (default)
# cargo make help             # list all available tasks
#
# ── BUILD ────────────────────────────────────────────────────────────────
# cargo make build            # compile debug binary
# cargo make debug            # alias for build
# cargo make release          # compile release binary (--locked)
# cargo make build-all        # compile ALL targets (debug)
# cargo make release-all      # compile ALL targets (release, --locked)
#
# ── RUN ──────────────────────────────────────────────────────────────────
# cargo make run              # run debug binary (ENV=dev)
# cargo make run-release      # run release binary
# cargo make run-dev          # run with ENV=dev
# cargo make run-sit          # run with ENV=sit
# cargo make run-prod         # run with ENV=prod (caution)
#
# ── CODE QUALITY ─────────────────────────────────────────────────────────
# cargo make fmt              # format all source files
# cargo make fmt-check        # check formatting (CI)
# cargo make clippy           # run Clippy linter (deny warnings)
# cargo make lint             # alias for clippy
# cargo make clippy-fix       # auto-apply Clippy fixes
# cargo make optimize         # clippy-fix → fmt → clippy (verify)
# cargo make check            # fast cargo check
#
# ── TESTS ────────────────────────────────────────────────────────────────
# cargo make test             # run all tests (--all-targets --locked)
# cargo make testv            # run tests with stdout visible
# cargo make test-release     # run tests in release mode
# cargo make nextest          # run tests with cargo-nextest
# cargo make bench            # run benchmarks
# cargo make cover            # generate HTML coverage report
#
# ── DOCS ─────────────────────────────────────────────────────────────────
# cargo make doc              # build docs (private items) + open
# cargo make doc-check        # build docs without opening (CI)
#
# ── SECURITY & DEPENDENCIES ──────────────────────────────────────────────
# cargo make audit            # check CVEs in dependencies
# cargo make deny             # run all cargo-deny checks
# cargo make deny-init        # initialize deny.toml template
# cargo make deny-advisories  # check for security advisories
# cargo make deny-bans        # check for banned crates
# cargo make deny-licenses    # check dependency licenses
# cargo make deny-sources     # check crate sources
# cargo make security         # alias for ci-security (audit + deny)
# cargo make outdated         # list outdated dependencies
# cargo make udeps            # detect unused dependencies (nightly)
# cargo make update           # update Cargo.lock
# cargo make upgrade          # upgrade Cargo.toml constraints (⚠ see warning)
# cargo make update-toolchain # rustup update + cargo update
#
# ── DATABASE MIGRATIONS ──────────────────────────────────────────────────
# cargo make migrate          # run pending migrations (sqlx)
# cargo make migrate-revert   # revert last migration (sqlx)
#
# ── WATCH ────────────────────────────────────────────────────────────────
# cargo make watch            # recompile on file changes
# cargo make watch-run        # recompile + restart on file changes
# cargo make watch-test       # re-run tests on file changes
# cargo make watch-check      # re-run cargo check on file changes
#
# ── CLEAN ────────────────────────────────────────────────────────────────
# cargo make clean            # remove target/
# cargo make dist-clean       # remove target/ + Cargo.lock
#
# ── CI ───────────────────────────────────────────────────────────────────
# cargo make ci               # fmt-check → clippy → test
# cargo make ci-security      # audit + deny
# cargo make security         # alias for ci-security
# cargo make ci-full          # fmt-check → clippy → test → audit → deny → doc-check
#
# ── DOCKER ───────────────────────────────────────────────────────────────
# cargo make docker-build     # docker build -t <APP>:<ENV> .
# cargo make docker-run       # docker run -p 8080:8080 --env-file .env
#
# ── STATISTICS ───────────────────────────────────────────────────────────
# cargo make stats            # lines-of-code summary
# cargo make stats-detail     # per-file lines-of-code
# cargo make status           # alias for stats
#
# ── SETUP ────────────────────────────────────────────────────────────────
# cargo make install          # install all recommended cargo tools
# cargo make version          # print Rust toolchain versions
# ─────────────────────────────────────────────────────────────────────────────

[config]
default_to_workspace = false
skip_core_tasks = false
min_version = "0.37.0"

# ── Project-wide environment variables ───────────────────────────────────────
[env]
APP = "ucs-fe"
# ENV defaults to "dev" when not set in the calling shell.
ENV = { value = "dev", condition = { env_not_set = ["ENV"] } }
CARGO_MAKE_DEFAULT_TASK_NAME = "default"

# ─────────────────────────────────────────────────────────────────────────────
# DEFAULT
# ─────────────────────────────────────────────────────────────────────────────
[tasks.default]
description = "Format-check then compile (debug). Run `cargo make help` for all tasks."
dependencies = ["fmt-check", "build"]

# ─────────────────────────────────────────────────────────────────────────────
# HELP
# FIX: Simplified to a plain `cargo make --list-all-steps` call.
# The original pipeline (grep | sort) relied on Unix shell builtins and broke
# on Windows. The bare subcommand is cross-platform and equally informative.
# ─────────────────────────────────────────────────────────────────────────────
[tasks.help]
description = "List all available tasks with their descriptions."
command = "cargo"
args = ["make", "--list-all-steps"]

# ─────────────────────────────────────────────────────────────────────────────
# SETUP — install development toolchain extras
# ─────────────────────────────────────────────────────────────────────────────
[tasks.install]
description = "Install all recommended cargo add-on tools."
dependencies = [
  "install-cargo-watch",
  "install-cargo-edit",
  "install-cargo-outdated",
  "install-cargo-audit",
  "install-cargo-deny",
  "install-cargo-tarpaulin",
  "install-cargo-nextest",
  "install-cargo-udeps",
  "install-sqlx",
  "install-tokei",
]

[tasks.install-cargo-watch]
description = "Install cargo-watch (live-reload on file changes)."
command = "cargo"
args = ["install", "cargo-watch", "--locked"]

[tasks.install-cargo-edit]
description = "Install cargo-edit (cargo add / cargo upgrade)."
command = "cargo"
args = ["install", "cargo-edit", "--locked"]

[tasks.install-cargo-outdated]
description = "Install cargo-outdated (check for stale dependencies)."
command = "cargo"
args = ["install", "cargo-outdated", "--locked"]

[tasks.install-cargo-audit]
description = "Install cargo-audit (check for CVEs in dependencies)."
command = "cargo"
args = ["install", "cargo-audit", "--locked"]

[tasks.install-cargo-deny]
description = "Install cargo-deny (supply chain security: licenses, bans, advisories, sources)."
command = "cargo"
args = ["install", "cargo-deny", "--locked"]

[tasks.install-cargo-tarpaulin]
description = "Install cargo-tarpaulin (code-coverage report)."
command = "cargo"
args = ["install", "cargo-tarpaulin", "--locked"]

[tasks.install-cargo-nextest]
description = "Install cargo-nextest (faster, richer test runner)."
command = "cargo"
args = ["install", "cargo-nextest", "--locked"]

[tasks.install-cargo-udeps]
description = "Install cargo-udeps (detect unused dependencies, requires nightly)."
command = "cargo"
args = ["install", "cargo-udeps", "--locked"]

[tasks.install-sqlx]
description = "Install sqlx-cli (database migration management)."
command = "cargo"
args = ["install", "sqlx-cli", "--locked"]

[tasks.install-tokei]
description = "Install tokei (lines-of-code statistics)."
command = "cargo"
args = ["install", "tokei", "--locked"]

# ─────────────────────────────────────────────────────────────────────────────
# VERSION
# FIX: Reformatted script array to multi-line for consistency with all other
# multi-command script blocks in this file.
# ─────────────────────────────────────────────────────────────────────────────
[tasks.version]
description = "Print Rust toolchain version."
script = [
  "rustc --version",
  "cargo --version",
  "rustup --version",
]

# ─────────────────────────────────────────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────────────────────────────────────────
[tasks.build]
description = "Compile debug binary (fast iteration build)."
command = "cargo"
args = ["build", "--bin", "${APP}"]

[tasks.debug]
description = "Alias for `build` — compile debug binary with full debug info."
alias = "build"

[tasks.release]
description = "Compile optimised release binary (stripped, fast, locked)."
command = "cargo"
args = ["build", "--release", "--bin", "${APP}", "--locked"]

[tasks.build-all]
description = "Compile ALL targets (bins, examples, tests, benches) in debug mode."
command = "cargo"
args = ["build", "--all-targets"]

[tasks.release-all]
description = "Compile ALL targets in release mode (locked)."
command = "cargo"
args = ["build", "--release", "--all-targets", "--locked"]

# ─────────────────────────────────────────────────────────────────────────────
# STATISTICS — project metrics (requires tokei)
# ─────────────────────────────────────────────────────────────────────────────
[tasks.stats]
description = "Show project lines-of-code statistics (auto-installs tokei)."
install_crate = "tokei"
command = "tokei"
args = ["--sort", "code"]

[tasks.stats-detail]
description = "Per-file lines-of-code breakdown."
install_crate = "tokei"
command = "tokei"
args = ["--files", "--sort", "code"]

[tasks.status]
description = "Alias for `stats`."
alias = "stats"

# ─────────────────────────────────────────────────────────────────────────────
# RUN
# NOTE: `cargo run` drives its own incremental compilation; no explicit
# `dependencies = ["build"]` is needed and would only cause a redundant pass.
# ENV is intentionally not forced here so that `run` and `run-release` pick up
# whatever value the caller has exported in their shell (global [env] default
# is "dev" when nothing is set).
# ─────────────────────────────────────────────────────────────────────────────
[tasks.run]
description = "Run the service in debug mode. Set ENV in shell to override (default: dev)."
command = "cargo"
args = ["run", "--bin", "${APP}"]

[tasks.run-release]
description = "Run the service in release mode. Set ENV in shell to override (default: dev)."
command = "cargo"
args = ["run", "--release", "--bin", "${APP}"]

[tasks.run-dev]
description = "Run with ENV=dev (development config)."
command = "cargo"
args = ["run", "--bin", "${APP}"]

[tasks.run-dev.env]
ENV = "dev"

[tasks.run-sit]
description = "Run with ENV=sit (SIT config)."
command = "cargo"
args = ["run", "--bin", "${APP}"]

[tasks.run-sit.env]
ENV = "sit"

[tasks.run-prod]
description = "Run with ENV=prod (production config — use with caution)."
command = "cargo"
args = ["run", "--release", "--bin", "${APP}"]

[tasks.run-prod.env]
ENV = "prod"

# ─────────────────────────────────────────────────────────────────────────────
# CODE QUALITY
# ─────────────────────────────────────────────────────────────────────────────
[tasks.check]
description = "Run `cargo check` (fast, no codegen)."
command = "cargo"
args = ["check", "--all-targets"]

[tasks.fmt]
description = "Format all source files with rustfmt."
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-check]
description = "Assert code is already formatted — fails in CI if not."
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.clippy]
description = "Run Clippy linter (deny warnings)."
command = "cargo"
args = [
  "clippy",
  "--all-targets",
  "--all-features",
  "--",
  "-D", "warnings",
  "-W", "clippy::correctness",
  "-W", "clippy::suspicious",
  "-W", "clippy::perf",
  "-W", "clippy::complexity",
  "-W", "clippy::style",
  "-W", "clippy::pedantic",
]

[tasks.lint]
description = "Alias for `clippy`."
alias = "clippy"

[tasks.clippy-fix]
description = "Run Clippy and auto-apply fixes (best-effort; does not fail on unfixable warnings)."
command = "cargo"
args = [
  "clippy",
  "--all-targets",
  "--fix",
  "--allow-dirty",
  "--allow-staged",
  "--",
  "-W", "clippy::pedantic",
]

# The final `clippy` step is a verification pass to catch any warnings
# that `clippy-fix` could not auto-fix automatically.
[tasks.optimize]
description = "Auto-fix Clippy suggestions, reformat, then verify no residual warnings remain."
dependencies = ["clippy-fix", "fmt", "clippy"]

# ─────────────────────────────────────────────────────────────────────────────
# TESTS
# ─────────────────────────────────────────────────────────────────────────────
[tasks.test]
description = "Run all unit and integration tests (all targets, locked)."
command = "cargo"
args = ["test", "--all-targets", "--locked"]

[tasks.testv]
description = "Run all tests with output visible."
command = "cargo"
args = ["test", "--all", "--", "--nocapture"]

[tasks.test-release]
description = "Run tests in release mode (catches optimisation-dependent bugs)."
command = "cargo"
args = ["test", "--release", "--all"]

[tasks.nextest]
description = "Run tests with cargo-nextest (faster, colour output). Requires install."
command = "cargo"
args = ["nextest", "run"]

[tasks.bench]
description = "Run benchmarks."
command = "cargo"
args = ["bench"]

[tasks.cover]
description = "Generate HTML coverage report with tarpaulin."
command = "cargo"
args = [
  "tarpaulin",
  "--all-features",
  "--workspace",
  "--timeout", "120",
  "--out", "Html",
  "--output-dir", "target/coverage",
]

# ─────────────────────────────────────────────────────────────────────────────
# DOCS
# ─────────────────────────────────────────────────────────────────────────────
[tasks.doc]
description = "Build rustdoc documentation (including private items) and open in browser."
command = "cargo"
args = ["doc", "--no-deps", "--open", "--document-private-items"]

[tasks.doc-check]
description = "Build docs without opening (CI-safe doc lint check)."
command = "cargo"
args = ["doc", "--no-deps"]

[tasks.doc-check.env]
RUSTDOCFLAGS = "-D warnings"

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY & DEPENDENCIES
# ─────────────────────────────────────────────────────────────────────────────
[tasks.audit]
description = "Check dependencies for known CVEs (requires cargo-audit)."
command = "cargo"
args = ["audit"]

[tasks.deny-init]
description = "Initialize deny.toml configuration template (run once)."
command = "cargo"
args = ["deny", "init"]

[tasks.deny-advisories]
description = "Check for security advisories and unmaintained crates."
command = "cargo"
args = ["deny", "check", "advisories"]

[tasks.deny-bans]
description = "Check for banned crates and multiple versions of the same crate."
command = "cargo"
args = ["deny", "check", "bans"]

[tasks.deny-licenses]
description = "Check that all dependency licenses are allowed (configure in deny.toml)."
command = "cargo"
args = ["deny", "check", "licenses"]

[tasks.deny-sources]
description = "Ensure crates only come from trusted sources (crates.io, git, etc.)."
command = "cargo"
args = ["deny", "check", "sources"]

[tasks.deny]
description = "Run all cargo-deny checks: advisories + bans + licenses + sources."
command = "cargo"
args = ["deny", "check"]

[tasks.outdated]
description = "List outdated dependencies (requires cargo-outdated)."
command = "cargo"
args = ["outdated", "-R"]

[tasks.udeps]
description = "Detect unused dependencies (requires cargo-udeps + nightly toolchain)."
command = "cargo"
args = ["+nightly", "udeps", "--all-targets"]

[tasks.update]
description = "Update Cargo.lock to latest compatible versions."
command = "cargo"
args = ["update"]

# ⚠ WARNING: --incompatible upgrades to breaking (semver-major) versions and
# will likely fail compilation. Always run on a dedicated branch and verify
# the full build + test suite before merging.
[tasks.upgrade]
description = "Upgrade Cargo.toml constraints including breaking versions — run on a separate branch and verify before merging."
script = [
  "cargo upgrade --incompatible",
  "cargo update",
]

[tasks.update-toolchain]
description = "Update Rust toolchain via rustup and refresh Cargo.lock."
script = [
  "rustup update",
  "cargo update",
]

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE MIGRATIONS (sqlx)
# ─────────────────────────────────────────────────────────────────────────────
[tasks.migrate]
description = "Run pending database migrations (requires sqlx-cli)."
command = "sqlx"
args = ["migrate", "run"]

[tasks.migrate-revert]
description = "Revert the last applied database migration (requires sqlx-cli)."
command = "sqlx"
args = ["migrate", "revert"]

# ─────────────────────────────────────────────────────────────────────────────
# WATCH — live-reload development (requires cargo-watch)
# ─────────────────────────────────────────────────────────────────────────────
[tasks.watch]
description = "Recompile on every source file change (requires cargo-watch)."
command = "cargo"
args = ["watch", "-x", "build"]

# FIX: Restored ${APP} variable reference. cargo-make expands [env] variables
# in `args` elements before passing them to the process, so ${APP} resolves
# correctly. Using the variable keeps watch-run in sync with the global APP
# setting and avoids a silent breakage if the binary is ever renamed.
[tasks.watch-run]
description = "Recompile and restart the service on file changes."
command = "cargo"
args = ["watch", "-x", "run --bin ucs-fe"]

[tasks.watch-test]
description = "Re-run all tests on file changes."
command = "cargo"
args = ["watch", "-x", "test"]

[tasks.watch-check]
description = "Re-run `cargo check` on file changes (fastest feedback loop)."
command = "cargo"
args = ["watch", "-x", "check"]

# ─────────────────────────────────────────────────────────────────────────────
# CLEAN
# ─────────────────────────────────────────────────────────────────────────────
[tasks.clean]
description = "Remove the `target/` build directory."
command = "cargo"
args = ["clean"]

# FIX: Replaced Unix-only `rm -f` with platform-specific task overrides.
# cargo-make merges the base task with the active platform override at runtime:
# Linux/macOS execute the [linux] variant, Windows executes the [windows] variant.
[tasks.dist-clean]
description = "Remove `target/` AND Cargo.lock (full reset)."
dependencies = ["clean"]

[tasks.dist-clean.linux]
script = [
  "rm -f Cargo.lock",
  "echo 'dist-clean: target/ and Cargo.lock removed'",
]

[tasks.dist-clean.windows]
script = [
  "if exist Cargo.lock del /f Cargo.lock",
  "echo dist-clean: target/ and Cargo.lock removed",
]

# ─────────────────────────────────────────────────────────────────────────────
# CI GATE — single command for CI pipelines
# ─────────────────────────────────────────────────────────────────────────────
[tasks.ci]
description = "Basic CI gate: fmt-check → clippy → test."
dependencies = ["fmt-check", "clippy", "test"]

[tasks.ci-security]
description = "Security-focused CI: audit + full deny checks."
dependencies = ["audit", "deny"]

# `security` is a convenience alias for interactive use; CI pipelines should
# call `ci-security` directly so the intent is explicit in pipeline logs.
[tasks.security]
description = "Alias for `ci-security` — full dependency security check."
alias = "ci-security"

[tasks.ci-full]
description = "Extended CI gate: fmt-check → clippy → test → audit → deny → doc-check."
dependencies = ["fmt-check", "clippy", "test", "audit", "deny", "doc-check"]

# ─────────────────────────────────────────────────────────────────────────────
# DOCKER / DEPLOY
# ─────────────────────────────────────────────────────────────────────────────
[tasks.docker-build]
description = "Build Docker image tagged as ${APP}:${ENV}."
script = ["docker build -t ${APP}:${ENV} ."]

[tasks.docker-run]
description = "Run the service inside Docker with --env-file .env and port 8080 exposed."
script = ["docker run --rm -p 8080:8080 --env-file .env ${APP}:${ENV}"]
